server {
    listen 3000;
    server_name localhost;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;

    # Static client files
    root  /usr/share/nginx/html;
    index index.html;

    gzip         on;
    gzip_vary    on;
    gzip_comp_level 6;
    gzip_types   text/plain text/css application/javascript application/json
                 application/wasm image/svg+xml;

    # Long-lived cache for content-hashed assets (Vite adds hashes to filenames)
    location ~* \.(js|css|woff2?|ttf|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA — all unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API reverse proxy
    # client_max_body_size covers batches of up to 8 base64-encoded images
    # (~200 MiB worst case).
    location /api/ {
        proxy_pass          http://server:9000;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  120s;
        proxy_send_timeout  60s;
        client_max_body_size 200m;
    }
}