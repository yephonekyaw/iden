services:

  # PostgreSQL + pgvector
  postgres:
    image: pgvector/pgvector:pg18-trixie
    container_name: iden-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    networks:
      - iden-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Verification server
  server:
    build:
      context: ./server
    container_name: iden-server
    restart: unless-stopped
    env_file: ./server/.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - iden-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Nginx
  web:
    build:
      context: ./client
      args:
        VITE_API_URL: /api/v1
    container_name: iden-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server
    networks:
      - iden-net

volumes:
  postgres_data:

networks:
  iden-net:
    driver: bridge
